<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Passenger Details | BusGo</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
background:#f5f5f5;
font-family:Poppins,sans-serif;
}

.container{

max-width:600px;

margin:120px auto;

background:white;

padding:35px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,.1);

}

h1{

text-align:center;

color:#d84e55;

margin-bottom:25px;

}

.info{

background:#fff5f5;

padding:15px;

border-radius:10px;

margin-bottom:20px;

line-height:2;

}

input,select{

width:100%;

padding:14px;

margin-bottom:18px;

border:1px solid #ddd;

border-radius:8px;

font-size:16px;

}

button{

width:100%;

padding:15px;

background:#d84e55;

color:white;

border:none;

font-size:18px;

border-radius:8px;

cursor:pointer;

}

button:hover{

background:#b73840;

}

</style>

</head>

<body>

<div class="container">

<h1>Passenger Details</h1>

<div class="info">

<p><b>Bus :</b> <span id="bus"></span></p>

<p><b>Seat :</b> <span id="seat"></span></p>

<p><b>Price :</b> ₹<span id="price"></span></p>

</div>

<form id="bookingForm">

<input
type="text"
id="name"
placeholder="Passenger Name"
required>

<input
type="number"
id="age"
placeholder="Age"
required>

<select id="gender" required>

<option value="">Select Gender</option>

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

<input
type="tel"
id="phone"
placeholder="Phone Number"
maxlength="10"
required>

<button type="submit">

Confirm Booking

</button>

</form>

</div>

<script src="js/booking.js"></script>

</body>

</html>
