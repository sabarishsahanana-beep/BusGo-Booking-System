<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Successful | BusGo</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
background:#f5f5f5;
font-family:Poppins,sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.ticket{

background:white;

width:450px;

padding:35px;

border-radius:20px;

box-shadow:0 15px 35px rgba(0,0,0,.15);

}

.success{

text-align:center;

font-size:70px;

color:#4CAF50;

}

h1{

text-align:center;

color:#d84e55;

margin-bottom:25px;

}

.row{

display:flex;

justify-content:space-between;

padding:12px 0;

border-bottom:1px dashed #ddd;

}

.row span:first-child{

font-weight:bold;

}

button{

width:100%;

margin-top:30px;

padding:15px;

border:none;

background:#d84e55;

color:white;

font-size:18px;

border-radius:10px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#b73840;

}

.home{

background:#333;
margin-top:15px;

}

.home:hover{

background:#111;

}

</style>

</head>

<body>

<div class="ticket">

<div class="success">

✅

</div>

<h1>

Booking Successful

</h1>

<div class="row">

<span>Passenger</span>

<span id="name"></span>

</div>

<div class="row">

<span>Bus</span>

<span id="bus"></span>

</div>

<div class="row">

<span>Seat</span>

<span id="seat"></span>

</div>

<div class="row">

<span>Age</span>

<span id="age"></span>

</div>

<div class="row">

<span>Gender</span>

<span id="gender"></span>

</div>

<div class="row">

<span>Phone</span>

<span id="phone"></span>

</div>

<div class="row">

<span>Journey</span>

<span id="journey"></span>

</div>

<div class="row">

<span>Amount</span>

<span>₹ <span id="price"></span></span>

</div>

<button onclick="window.print()">

🖨️ Print Ticket

</button>

<button class="home"

onclick="location.href='index.html'">

🏠 Back To Home

</button>

</div>

<script>

document.getElementById("name").innerHTML=
localStorage.getItem("passengerName");

document.getElementById("bus").innerHTML=
localStorage.getItem("busName");

document.getElementById("seat").innerHTML=
localStorage.getItem("seatNumber");

document.getElementById("age").innerHTML=
localStorage.getItem("age");

document.getElementById("gender").innerHTML=
localStorage.getItem("gender");

document.getElementById("phone").innerHTML=
localStorage.getItem("phone");

document.getElementById("price").innerHTML=
localStorage.getItem("price");

document.getElementById("journey").innerHTML=
localStorage.getItem("date");

</script>

</body>

</html>
